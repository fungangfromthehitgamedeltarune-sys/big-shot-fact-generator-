<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pyforn Translator and Dictionary</title>
<style>
body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: #0f0f12;
  color: #eaeaf0;
  padding: 16px;
}

#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

#search {
  flex: 1;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: #18181d;
  color: white;
  outline: none;
  font-size: 14px;
}

#translatorBox {
  margin-bottom: 20px;
  padding: 12px;
  border-radius: 12px;
  background: #18181d;
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}

#translateInput {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: #0f0f12;
  color: white;
}

#translateOutput {
  margin-top: 10px;
  font-weight: 500;
  color: #cfcfe6;
}

  
#tables {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.section {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.section-title {
  padding: 10px 14px;
  font-weight: 600;
  letter-spacing: 0.4px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td {
  padding: 8px 12px;
  font-size: 14px;
}

tr:nth-child(even) {
  background: rgba(255,255,255,0.05);
}

tr:hover {
  background: rgba(255,255,255,0.1);
}

label {
  user-select: none;
  font-size: 14px;
}

#topBar{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:16px;
}

#fuzzyLabel{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:14px;
  user-select:none;
}

#openTranslator{
  padding:10px 14px;
  border-radius:8px;
  border:none;
  background:#2a2a33;
  color:white;
  cursor:pointer;
}


#translatorTop{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}

#translatorControls{
  display:flex;
  flex:1;
  justify-content:space-between;
  align-items:center;
}

#translateInput{
  flex:1;
  max-width:500px;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.15);
  background:#18181d;
  color:white;
}

#directionToggle{
  display:flex;
  align-items:center;
  gap:8px;
}

#translateOutput{
  margin-top:20px;
  font-size:18px;
  font-weight:500;
}

</style>
</head>
<body>

<div id="dictionaryPage">
  <div id="topBar">
    <input id="search" placeholder="Search words or translations..." />

    <label id="fuzzyLabel">
      <input type="checkbox" id="fuzzyToggle" checked>
      Fuzzy
    </label>
  
    <button id="openTranslator">➡ Translator</button>
  </div>


  <div id="tables"></div>
</div>


<div id="translatorPage" style="display:none;">
  <div id="translatorTop">

    <button id="backToDict">⬅ Dictionary</button>

    <div id="translatorControls">
      <input id="translateInput" placeholder="Enter text..." />
      
      <label id="directionToggle">
        Pyforn → English
        <input type="checkbox" id="directionSwitch">
        English → Pyforn
      </label>
    </div>

  </div>

  <div id="translateOutput"></div>
</div>


<script>
const DATA_URL = "https://raw.githubusercontent.com/AdvertiserLucas/ImJustTryingToSendAFile/refs/heads/main/pyforn.json";

const container = document.getElementById("tables");
const searchInput = document.getElementById("search");
const fuzzyToggle = document.getElementById("fuzzyToggle");

let data = {};
let lastHover = null;
let lastJSON = "";

// --- Helpers ---
function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  return hash;
}

function seededColor(seed) {
  const hue = Math.abs(hashString(seed)) % 360;
  return `hsl(${hue}, 65%, 65%)`;
}

const dictionaryPage = document.getElementById("dictionaryPage");
const translatorPage = document.getElementById("translatorPage");

document.getElementById("openTranslator").onclick = () => {
  dictionaryPage.style.display = "none";
  translatorPage.style.display = "block";
};

document.getElementById("backToDict").onclick = () => {
  translatorPage.style.display = "none";
  dictionaryPage.style.display = "block";
};

  
// --- Fuzzy matching ---
function levenshtein(a, b) {
  const dp = Array.from({ length: a.length + 1 }, () =>
    new Array(b.length + 1).fill(0)
  );

  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;

  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
      );
    }
  }

  return dp[a.length][b.length];
}

function fuzzyMatchScore(query, text) {
  const q = query.toLowerCase();
  const t = text.toLowerCase();

  if (t.includes(q)) return 0; // exact substring = highest priority

  if (Math.abs(t.length - q.length) > 3) return Infinity;

  const distance = levenshtein(q, t);
  const maxAllowed = Math.ceil(q.length * 0.4);
  return distance <= maxAllowed ? distance : Infinity;
}

// --- Render ---
function render(filter = "") {
  container.innerHTML = "";

  for (const [sectionName, sectionData] of Object.entries(data)) {
    const color = seededColor(sectionName);
    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = sectionName;
    title.style.background = color;
    title.style.color = "#111";

    // Collect matching rows with score
    const rows = [];
    const f = filter.toLowerCase().trim();
    const useFuzzy = fuzzyToggle.checked;

    for (const [key, value] of Object.entries(sectionData)) {
      let score = 0;
      if (f) {
        const keyLower = key.toLowerCase();
        const valueLower = value.toLowerCase();

        if (keyLower.includes(f) || valueLower.includes(f)) {
          score = 0; // exact substring
        } else if (useFuzzy) {
          const kScore = fuzzyMatchScore(f, keyLower);
          const vScore = fuzzyMatchScore(f, valueLower);
          score = Math.min(kScore, vScore);
        } else {
          continue;
        }
        if (score === Infinity) continue;
      }

      rows.push({ key, value, score });
    }

    if (!rows.length) continue;

    // Sort by score (lower = better)
    rows.sort((a,b) => a.score - b.score);

    const table = document.createElement("table");

    for (const rowData of rows) {
      const row = table.insertRow();
      row.insertCell().textContent = rowData.key;
      row.insertCell().textContent = rowData.value;

      const id = `${sectionName}:${rowData.key}:${rowData.value}`;
      row.addEventListener("mouseenter", () => { lastHover = id; });
      if (lastHover === id) row.style.background = "rgba(255,255,255,0.15)";
    }

    section.appendChild(title);
    section.appendChild(table);
    container.appendChild(section);
  }
}

// --- Load JSON ---
async function loadData() {
  const res = await fetch(DATA_URL);
  const text = await res.text();

  if (text === lastJSON) return;

  lastJSON = text;
  data = JSON.parse(text);

  buildDictionaries();
  render(searchInput.value);
}


const translateInput = document.getElementById("translateInput");
const translateOutput = document.getElementById("translateOutput");
const directionSwitch = document.getElementById("directionSwitch");

let pyfornToEnglish = {};
let englishToPyforn = {};

function buildDictionaries(){
  pyfornToEnglish = {};
  englishToPyforn = {};

  for(const section of Object.values(data)){
    for(const [english, pyforn] of Object.entries(section)){

      const p = pyforn.toLowerCase();
      const e = english.toLowerCase();

      if(!pyfornToEnglish[p]) pyfornToEnglish[p] = [];
      pyfornToEnglish[p].push(e);

      if(!englishToPyforn[e]) englishToPyforn[e] = [];
      englishToPyforn[e].push(p);
    }
  }
}

function detectCase(word){
  if(word === word.toUpperCase()) return "upper";
  if(word[0] === word[0].toUpperCase()) return "capital";
  return "lower";
}

function applyCase(word, style){
  if(style === "upper") return word.toUpperCase();
  if(style === "capital") return word.charAt(0).toUpperCase() + word.slice(1);
  return word;
}

function splitPunctuation(token){
  const match = token.match(/^([^a-zA-Z]*)([a-zA-Z]+)([^a-zA-Z]*)$/);
  
  if(!match){
    return {prefix:"", word:token, suffix:""};
  }

  return {
    prefix: match[1],
    word: match[2],
    suffix: match[3]
  };
}

function translate(text){

  const tokens = text.trim().split(/\s+/);
  const result = [];

  const dict = directionSwitch.checked
    ? englishToPyforn
    : pyfornToEnglish;

  for(const token of tokens){

    const {prefix, word, suffix} = splitPunctuation(token);

    const caseStyle = detectCase(word);

    const lookup = word.toLowerCase();

    let translated;

    if(dict[lookup]){
      translated = dict[lookup].join("/");
    }else{
      translated = "?";
    }

    translated = applyCase(translated, caseStyle);

    result.push(prefix + translated + suffix);
  }

  return result.join(" ");
}


translateInput.addEventListener("input",()=>{
  translateOutput.textContent = translate(translateInput.value);
});



  
// --- Event listeners ---
searchInput.addEventListener("input", e => { render(e.target.value); });
fuzzyToggle.addEventListener("change", () => { render(searchInput.value); });

// --- Initial load + auto-refresh ---
loadData();
setInterval(loadData, 30_000);

</script>

</body>
</html>
