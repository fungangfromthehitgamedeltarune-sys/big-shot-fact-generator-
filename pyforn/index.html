<style>
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f0f12;
    color: #eaeaf0;
    padding: 16px;
  }

  #search {
    width: 100%;
    max-width: 420px;
    padding: 10px 14px;
    margin-bottom: 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: #18181d;
    color: white;
    outline: none;
    font-size: 14px;
  }

  #tables {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  .section {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  .section-title {
    padding: 10px 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  td {
    padding: 8px 12px;
    font-size: 14px;
  }

  tr:nth-child(even) {
    background: rgba(255,255,255,0.05);
  }

  tr:hover {
    background: rgba(255,255,255,0.1);
  }
</style>

<input id="search" placeholder="Search words or translations..." />
<div id="tables"></div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/AdvertiserLucas/ImJustTryingToSendAFile/refs/heads/main/pyforn.json";

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  return hash;
}

function seededColor(seed) {
  const hue = Math.abs(hashString(seed)) % 360;
  return `hsl(${hue}, 65%, 65%)`;
}

const container = document.getElementById("tables");
const searchInput = document.getElementById("search");

let data = {};

async function loadData() {
  const res = await fetch(DATA_URL);
  data = await res.json();

  // re-render using current search value
  render(searchInput.value);
}

let lastHover = null;

function render(filter = "") {
  container.innerHTML = "";

  for (const [sectionName, sectionData] of Object.entries(data)) {
    const color = seededColor(sectionName);

    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = sectionName;
    title.style.background = color;
    title.style.color = "#111";

    const table = document.createElement("table");

    let hasRows = false;

    for (const [key, value] of Object.entries(sectionData)) {
      const text = (key + value).toLowerCase();
      if (!text.includes(filter.toLowerCase())) continue;

      hasRows = true;
      const row = table.insertRow();
      row.insertCell().textContent = key;
      row.insertCell().textContent = value;
    }

    if (!hasRows) continue;

    section.appendChild(title);
    section.appendChild(table);
    container.appendChild(section);
  }
}

searchInput.addEventListener("input", e => {
  render(e.target.value);
});
// setInterval(loadData, 2_000); 
loadData();
</script>
